<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm công việc</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Card -->
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thêm công việc</h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/add}" th:object="${todo}" method="post">

                        <div class="form-group">
                            <label>Nội dung</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{content}"
                                   placeholder="Nhập nội dung công việc">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('content')}"
                                   th:errors="*{content}"></small>
                        </div>

                        <div class="form-group">
                            <label>Ngày hết hạn</label>
                            <input type="date"
                                   class="form-control"
                                   th:field="*{dueDate}">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('dueDate')}"
                                   th:errors="*{dueDate}"></small>
                        </div>

                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select class="form-control" th:field="*{status}">
                                <option value="">-- Chọn trạng thái --</option>
                                <option value="PENDING">PENDING</option>
                                <option value="DONE">DONE</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Độ ưu tiên</label>
                            <select class="form-control" th:field="*{priority}">
                                <option value="">-- Chọn độ ưu tiên --</option>
                                <option value="LOW">LOW</option>
                                <option value="MEDIUM">MEDIUM</option>
                                <option value="HIGH">HIGH</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/}" class="btn btn-secondary">
                                Quay lại
                            </a>

                            <button type="submit" class="btn btn-success">
                                Lưu
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
