<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo App</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="font-weight-bold text-primary">Danh sách công việc</h2>

        <a th:href="@{/add}" class="btn btn-success">
            Thêm mới
        </a>
    </div>

    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nội dung</th>
                    <th>Ngày</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="t : ${todos}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.content}"></td>

                    <td th:text="${#temporals.format(t.dueDate, 'dd/MM/yyyy')}"></td>

                    <td>
                        <span class="badge"
                              th:classappend="${t.status == 'DONE'} ? 'badge-success' : 'badge-info'"
                              th:text="${t.status}">
                        </span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="
                                ${t.priority == 'HIGH'} ? 'badge-danger' :
                                (${t.priority == 'MEDIUM'} ? 'badge-warning' : 'badge-secondary')"
                              th:text="${t.priority}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/edit/{id}(id=${t.id})}"
                           class="btn btn-sm btn-warning">
                            ✏Sửa
                        </a>

                        <a th:href="@{/delete/{id}(id=${t.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Bạn có chắc muốn xóa không')">
                            Xóa
                        </a>
                    </td>
                </tr>

                <!-- Empty state -->
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        Chưa có công việc nào
                    </td>
                </tr>

                </tbody>
            </table>

        </div>
    </div>

</div>

<!-- JS cho alert đóng -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
