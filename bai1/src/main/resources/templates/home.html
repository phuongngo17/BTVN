<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo App</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="font-weight-bold text-primary">Danh sách công việc</h2>

        <a th:href="@{/add}" class="btn btn-success">
             Thêm mới
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nội dung</th>
                    <th>Ngày</th>
                    <th>Status</th>
                    <th>Priority</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="t : ${todos}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.content}"></td>

                    <!-- format date -->
                    <td th:text="${#temporals.format(t.dueDate, 'dd/MM/yyyy')}"></td>

                    <td>
                        <span class="badge badge-info"
                              th:text="${t.status}"></span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="
                                ${t.priority == 'HIGH'} ? 'badge-danger' :
                                (${t.priority == 'MEDIUM'} ? 'badge-warning' : 'badge-secondary')"
                              th:text="${t.priority}">
                        </span>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="5" class="text-center text-muted py-4">
                        Chưa có công việc nào
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
